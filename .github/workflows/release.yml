name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
            ext: ''
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
            ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
            ext: .exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            cross: true
            ext: .exe
          - os: macos-latest
            target: x86_64-apple-darwin
            cross: false
            ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            cross: false
            ext: ''
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross && matrix.os == 'ubuntu-latest'
        run: cargo install cross --locked

      - name: Build release
        shell: bash
        run: |
          if [[ "${{ matrix.cross }}" == "true" && "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rs-learn${{ matrix.ext }} dist/rs-learn-${{ matrix.target }}${{ matrix.ext }}
          cp target/${{ matrix.target }}/release/rs-learn-validate${{ matrix.ext }} dist/rs-learn-validate-${{ matrix.target }}${{ matrix.ext }}

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag }}
        shell: bash
        run: gh release upload "${TAG:-$GITHUB_REF_NAME}" dist/* --clobber
