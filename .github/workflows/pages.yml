name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Aggregate content with flatspace
        run: |
          mkdir -p docs/data content/pages-json
          for f in content/pages/*.yml; do
            name=$(basename "$f" .yml)
            yq -o=json eval "$f" > "content/pages-json/${name}.json"
            npx --yes flatspace aggregate --input "content/pages-json/${name}.json" --output "docs/data/${name}.json"
          done

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
