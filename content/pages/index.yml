ci:
  label: "ci // matrix"
  title: "six targets. all native. all green."
  intro: "cargo build + test across six native targets on every push. no cross compilation shenanigans. aarch64 linux and windows run pure-rust fallbacks where simsimd wasn't available."
  targets:
    - name: "x86_64-linux"
      status: "green"
    - name: "x86_64-windows"
      status: "green"
    - name: "x86_64-macos"
      status: "green"
    - name: "aarch64-macos"
      status: "green"
    - name: "aarch64-linux"
      status: "green"
    - name: "aarch64-windows"
      status: "green"
quote:
  label: "footnote"
  title: "// why."
  text: "stateless agents forget. rs-learn remembers — episodes, entities, relations, preferences, failures. then it learns from what it remembers. three clocks, one store, one binary. pure rust. we were here first."
